extends: recommended
rules:
  canonical_prefixes:
    level: error
  no_empty_title:
    level: error
  no_invalid_slot_usage:
    level: error
  no_undeclared_slots:
    level: error
  no_undeclared_ranges:
    level: error
  no_xsd_int_type:
    level: error
  one_identifier_per_class:
    level: error
  one_key_per_class:
    level: error
  permissible_values_format:
    level: error
    format: "[a-zA-Z0-9][a-zA-Z0-9_:.-]*"
  recommended:
    level: error
  root_type_checks:
    level: error
  standard_naming:
    level: error
    exclude_type:
      - permissible_value
  tree_root_class:
    level: error
