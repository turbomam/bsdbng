id: https://w3id.org/bsdbng/schema
name: bsdbng
title: BugSigDB Normalized Graph Schema
description: >-
  LinkML schema for normalized BugSigDB studies, experiments, signatures,
  and taxa.
license: MIT
default_prefix: bsdbng
default_range: string

prefixes:
  linkml: https://w3id.org/linkml/
  bsdbng: https://w3id.org/bsdbng/
  NCBITaxon: http://purl.obolibrary.org/obo/NCBITaxon_
  bugsigdb: https://bugsigdb.org/

imports:
  - linkml:types

classes:
  BugSigDBDataset:
    tree_root: true
    title: Dataset
    description: Collection of normalized BugSigDB study records.
    attributes:
      studies:
        title: Study records
        range: StudyRecord
        multivalued: true
        inlined_as_list: true
        required: true
        description: Normalized study records in the dataset.

  StudyRecord:
    title: Study
    description: >-
      One published microbiome study from which BugSigDB collects and
      standardizes microbial signatures.
    slots:
      - study_id
      - source_record_id
      - pmid
      - title
      - publication_year
      - doi
      - url
    attributes:
      experiments:
        title: Experiments
        description: Semantic experiment units recorded for the study.
        range: ExperimentRecord
        multivalued: true
        inlined_as_list: true
        required: true
    slot_usage:
      study_id:
        identifier: true
        required: true

  ExperimentRecord:
    title: Experiment
    description: >-
      One semantic unit within a study that records contrasted sample groups
      and key metadata relevant to differential abundance findings.
    slots:
      - experiment_id
      - experiment_name
      - group_0_name
      - group_1_name
    attributes:
      signatures:
        title: Signatures
        description: Signatures associated with the experiment.
        range: SignatureRecord
        multivalued: true
        inlined_as_list: true
        required: true
    slot_usage:
      experiment_id:
        identifier: true
        required: true

  SignatureRecord:
    title: Signature
    description: >-
      A microbial signature represented as an unordered set of taxa sharing
      a common property or response to a study condition.
    slots:
      - signature_id
      - direction
    attributes:
      taxa:
        title: Taxa
        description: Taxa listed in the signature.
        range: TaxonRecord
        multivalued: true
        inlined_as_list: true
        required: true
    slot_usage:
      signature_id:
        identifier: true
        required: true
      direction:
        required: true

  TaxonRecord:
    title: Taxon
    description: >-
      A taxonomic unit of any rank designating a microbial organism or group
      of microbial organisms.
    slots:
      - taxon_id
      - taxon_name
      - taxonomic_rank
    slot_usage:
      taxon_id:
        required: true
      taxon_name:
        required: true
      taxonomic_rank:
        required: true

slots:
  study_id:
    title: Study ID
    description: BugSigDB study identifier.
    pattern: "^.+$"

  source_record_id:
    title: Source Record ID
    description: Study identifier exactly as exported by BugSigDB.
    range: string
    required: true

  title:
    title: Title
    description: Study title.
    range: string

  publication_year:
    title: Publication Year
    description: Publication year.
    range: integer
    minimum_value: 1900
    maximum_value: 2100

  pmid:
    title: PMID
    description: PubMed identifier for the study.
    range: integer
    minimum_value: 1

  doi:
    title: DOI
    description: Digital object identifier for the study.
    range: string
    pattern: "^10\\..+$"

  url:
    title: URL
    description: Stable URL for the study when no DOI or PMID is available.
    range: uri

  experiment_id:
    title: Experiment ID
    description: Experiment identifier.
    pattern: "^.+$"

  experiment_name:
    title: Experiment Name
    description: Label for the experiment.
    range: string

  group_0_name:
    title: Group 0 Name
    description: Label for one of the contrasted sample groups.
    range: string

  group_1_name:
    title: Group 1 Name
    description: Label for the other contrasted sample group.
    range: string

  signature_id:
    title: Signature ID
    description: Signature identifier.
    pattern: "^.+$"

  direction:
    title: Direction
    description: Reported direction of abundance change for taxa in the signature.
    range: DirectionEnum
    required: true

  taxon_id:
    title: Taxon ID
    description: NCBITaxon CURIE for the reported taxon.
    pattern: "^NCBITaxon:[0-9]+$"

  taxon_name:
    title: Taxon Name
    description: Reported taxon label.
    range: string

  taxonomic_rank:
    title: Taxonomic Rank
    description: Taxonomic rank of the reported taxon.
    range: TaxonomicRankEnum

enums:
  DirectionEnum:
    title: Direction values
    description: Allowed values for reported abundance direction.
    permissible_values:
      increased:
      decreased:

  TaxonomicRankEnum:
    title: Taxonomic rank values
    description: Allowed taxonomic rank values for normalized BugSigDB taxa.
    permissible_values:
      strain:
      species:
      subspecies:
      isolate:
      genus:
      family:
      order:
      class:
      phylum:
      superkingdom:
