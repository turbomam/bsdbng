id: https://w3id.org/bsdbng/schema
name: bsdbng
title: BugSigDB Normalized Graph Schema
description: >-
  LinkML schema for normalized BugSigDB studies, experiments, signatures,
  and taxa.
license: MIT
default_prefix: bsdbng
default_range: string

prefixes:
  linkml: https://w3id.org/linkml/
  bsdbng: https://w3id.org/bsdbng/
  bsdb: https://bugsigdb.org/Study_
  NCBITaxon: http://purl.obolibrary.org/obo/NCBITaxon_
  UBERON: http://purl.obolibrary.org/obo/UBERON_
  EFO: http://identifiers.org/efo/

imports:
  - linkml:types

classes:
  NamedThing:
    abstract: true
    title: Named Thing
    description: >-
      An entity with a stable identifier. All identifiable classes in
      this schema inherit from NamedThing.
    slots:
      - id

  Study:
    is_a: NamedThing
    tree_root: true
    title: Study
    description: >-
      One published microbiome study from which BugSigDB collects and
      standardizes microbial signatures.
    id_prefixes:
      - bsdb
    slots:
      - source_record_id
      - pmid
      - title
      - publication_year
      - doi
      - url
      - study_design
      - authors_list
      - journal
      - keywords
    attributes:
      experiments:
        title: Experiments
        description: Semantic experiment units recorded for the study.
        range: Experiment
        multivalued: true
        inlined_as_list: true
        required: true
    slot_usage:
      id:
        pattern: "^bsdb:.+$"
        description: >-
          BugSigDB study identifier. Usually numeric (e.g. bsdb:10202341)
          but some entries use DOIs or PMC IDs (e.g. bsdb:PMC11017998).

  Experiment:
    is_a: NamedThing
    title: Experiment
    description: >-
      One semantic unit within a study that records contrasted sample groups
      and key metadata relevant to differential abundance findings.
    id_prefixes:
      - bsdb
    slots:
      - experiment_name
      - location_of_subjects
      - host_species
      - body_site
      - body_site_ontology_id
      - condition
      - condition_ontology_id
      - group_0_name
      - group_1_name
      - group_1_definition
      - group_0_sample_size
      - group_1_sample_size
      - antibiotics_exclusion
      - sequencing_type
      - variable_region_16s
      - sequencing_platform
      - data_transformation
      - statistical_test
      - significance_threshold
      - mht_correction
      - lda_score_above
      - matched_on
      - confounders_controlled_for
      - pielou
      - shannon
      - chao1
      - simpson
      - inverse_simpson
      - richness
    attributes:
      signatures:
        title: Signatures
        description: Signatures associated with the experiment.
        range: Signature
        multivalued: true
        inlined_as_list: true
        required: true
    slot_usage:
      id:
        pattern: "^bsdb:.+-[0-9]+$"
        description: BugSigDB experiment identifier, e.g. bsdb:10202341-1.

  Signature:
    is_a: NamedThing
    title: Signature
    description: >-
      A microbial signature represented as an unordered set of taxa sharing
      a common property or response to a study condition.
    id_prefixes:
      - bsdb
    slots:
      - direction
      - signature_source
      - signature_description
    attributes:
      taxa:
        title: Taxa
        description: Taxa listed in the signature.
        range: Taxon
        multivalued: true
        inlined_as_list: true
        required: true
    slot_usage:
      id:
        pattern: "^bsdb:.+-[0-9]+-[0-9]+$"
        description: BugSigDB signature identifier, e.g. bsdb:10202341-1-1.
      direction:
        required: true

  Taxon:
    is_a: NamedThing
    title: Taxon
    description: >-
      A taxonomic unit of any rank designating a microbial organism or group
      of microbial organisms.
    id_prefixes:
      - NCBITaxon
    slots:
      - taxon_name
      - taxonomic_rank
    slot_usage:
      id:
        pattern: "^NCBITaxon:[0-9]+$"
        description: NCBITaxon CURIE, e.g. NCBITaxon:9606.
        recommended: true
        required: false
      taxon_name:
        required: true
      taxonomic_rank:
        recommended: true
        required: false

slots:
  id:
    identifier: true
    required: true
    title: ID
    description: Stable identifier for this entity.

  # --- Study slots ---

  source_record_id:
    title: Source Record ID
    description: Study identifier exactly as exported by BugSigDB.
    range: string
    required: true

  pmid:
    title: PMID
    description: PubMed identifier for the study.
    range: integer
    minimum_value: 1

  title:
    title: Title
    description: Study title.
    range: string

  publication_year:
    title: Publication Year
    description: Publication year.
    range: integer
    minimum_value: 1900
    maximum_value: 2100

  doi:
    title: DOI
    description: Digital object identifier for the study.
    range: string
    pattern: "^10\\..+$"

  url:
    title: URL
    description: Stable URL for the study when no DOI or PMID is available.
    range: uri

  study_design:
    title: Study Design
    description: Study design type (e.g. case-control, cross-sectional, meta-analysis).
    range: string

  authors_list:
    title: Authors List
    description: Author list as provided by BugSigDB.
    range: string

  journal:
    title: Journal
    description: Journal of publication.
    range: string

  keywords:
    title: Keywords
    description: Keywords associated with the study.
    range: string

  # --- Experiment slots ---

  experiment_name:
    title: Experiment Name
    description: Label for the experiment.
    range: string

  location_of_subjects:
    title: Location of Subjects
    description: Geographic location of study subjects.
    range: string

  host_species:
    title: Host Species
    description: Host organism species (e.g. Homo sapiens, Mus musculus).
    range: string

  body_site:
    title: Body Site
    description: Anatomical site of sample collection (e.g. stool, skin, oral cavity).
    range: string

  body_site_ontology_id:
    title: Body Site Ontology ID
    description: UBERON ontology term(s) for the body site (e.g. UBERON:0001988).
    aliases:
      - UBERON ID
    range: string
    pattern: "^UBERON:[0-9]+$"
    multivalued: true

  condition:
    title: Condition
    description: Disease or condition under study (e.g. obesity, colorectal cancer).
    range: string

  condition_ontology_id:
    title: Condition Ontology ID
    description: >-
      Ontology term(s) for the condition. BugSigDB labels this column "EFO ID"
      but it contains CURIEs from multiple ontologies including EFO, MONDO,
      HP, CHEBI, GO, and others.
    aliases:
      - EFO ID
    range: string
    multivalued: true

  group_0_name:
    title: Group 0 Name
    description: Label for the control or reference sample group.
    range: string

  group_1_name:
    title: Group 1 Name
    description: Label for the case or experimental sample group.
    range: string

  group_1_definition:
    title: Group 1 Definition
    description: Detailed definition of the case group.
    range: string

  group_0_sample_size:
    title: Group 0 Sample Size
    description: Number of subjects in the control group.
    range: integer
    minimum_value: 0

  group_1_sample_size:
    title: Group 1 Sample Size
    description: Number of subjects in the case group.
    range: integer
    minimum_value: 0

  antibiotics_exclusion:
    title: Antibiotics Exclusion
    description: Whether subjects on antibiotics were excluded.
    range: string

  sequencing_type:
    title: Sequencing Type
    description: Sequencing approach (e.g. 16S, shotgun, metatranscriptomics).
    range: string

  variable_region_16s:
    title: 16S Variable Region
    description: Targeted 16S rRNA variable region (e.g. V4, V3V4).
    range: string

  sequencing_platform:
    title: Sequencing Platform
    description: Sequencing platform used (e.g. Illumina, Ion Torrent).
    range: string

  data_transformation:
    title: Data Transformation
    description: Data normalization or transformation applied (e.g. relative abundances).
    range: string

  statistical_test:
    title: Statistical Test
    description: Statistical test used for differential abundance (e.g. Mann-Whitney, DESeq2).
    range: string

  significance_threshold:
    title: Significance Threshold
    description: P-value or FDR threshold used for significance.
    range: float

  mht_correction:
    title: MHT Correction
    description: Multiple hypothesis testing correction method (e.g. BH, Bonferroni).
    range: string

  lda_score_above:
    title: LDA Score Above
    description: LEfSe LDA score threshold if applicable.
    range: float

  matched_on:
    title: Matched On
    description: Variables on which groups were matched (e.g. age, BMI).
    range: string

  confounders_controlled_for:
    title: Confounders Controlled For
    description: Confounders accounted for in the analysis.
    range: string

  pielou:
    title: Pielou Evenness
    description: Direction of change in Pielou's evenness index between groups.
    range: DiversityDirectionEnum

  shannon:
    title: Shannon Diversity
    description: Direction of change in Shannon diversity index between groups.
    range: DiversityDirectionEnum

  chao1:
    title: Chao1 Richness
    description: Direction of change in Chao1 richness estimator between groups.
    range: DiversityDirectionEnum

  simpson:
    title: Simpson Index
    description: Direction of change in Simpson diversity index between groups.
    range: DiversityDirectionEnum

  inverse_simpson:
    title: Inverse Simpson
    description: Direction of change in inverse Simpson index between groups.
    range: DiversityDirectionEnum

  richness:
    title: Richness
    description: Direction of change in observed species richness between groups.
    range: DiversityDirectionEnum

  # --- Signature slots ---

  direction:
    title: Direction
    description: Reported direction of abundance change for taxa in the signature.
    range: DirectionEnum
    required: true

  signature_source:
    title: Source
    description: Source of the signature within the publication (e.g. Table S6, Figure 3).
    range: string

  signature_description:
    title: Description
    description: Free-text description of the signature from BugSigDB curators.
    range: string

  # --- Taxon slots ---

  taxon_name:
    title: Taxon Name
    description: Reported taxon label.
    range: string

  taxonomic_rank:
    title: Taxonomic Rank
    description: Taxonomic rank of the reported taxon.
    range: TaxonomicRankEnum

enums:
  DirectionEnum:
    title: Direction values
    description: Allowed values for reported abundance direction.
    permissible_values:
      increased:
      decreased:

  DiversityDirectionEnum:
    title: Diversity direction values
    description: >-
      Reported direction of change in an alpha diversity metric
      between the two sample groups.
    permissible_values:
      increased:
      decreased:
      unchanged:

  TaxonomicRankEnum:
    title: Taxonomic rank values
    description: Allowed taxonomic rank values for normalized BugSigDB taxa.
    permissible_values:
      strain:
      species:
      subspecies:
      isolate:
      genus:
      family:
      order:
      class:
      phylum:
      superkingdom:
