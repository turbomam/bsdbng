name: CI

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
          enable-cache: true
      - name: Install just
        run: uv tool install rust-just==1.39.0
      - name: Sync environment
        run: uv sync --all-extras --group dev --group qa
      - name: Run checks
        run: |
          just check
      - name: Run full pre-commit stack
        run: uv run pre-commit run --all-files
