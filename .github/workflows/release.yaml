name: Release pipeline

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.11"
          enable-cache: true

      - name: Install just
        run: uv tool install rust-just==1.39.0

      - name: Sync environment
        run: uv sync --all-extras --group dev --group qa

      - name: Run checks
        run: just check

      - name: Download BugSigDB data
        run: just download

      - name: Ingest studies
        run: just ingest

      - name: Validate all studies (Pydantic)
        run: just validate-studies

      - name: Report counts
        run: |
          echo "## Pipeline results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Raw CSVs: $(find data/raw -maxdepth 1 -type f -name '*.csv' | wc -l) files, $(du -sh data/raw/ | cut -f1)" >> $GITHUB_STEP_SUMMARY
          echo "- Studies: $(find data/studies -maxdepth 1 -type f -name '*.yaml' | wc -l) YAML files, $(du -sh data/studies/ | cut -f1)" >> $GITHUB_STEP_SUMMARY
          echo "- Ingest log: $(wc -l < data/derived/ingest_log.json) lines" >> $GITHUB_STEP_SUMMARY
          cat logs/pipeline.log >> $GITHUB_STEP_SUMMARY

      - name: Package data artifacts
        run: |
          tar --exclude=.gitkeep --exclude='./.gitkeep' -czf bsdbng-raw-data-${GITHUB_REF_NAME}.tar.gz -C data/raw .
          tar --exclude=.gitkeep --exclude='./.gitkeep' -czf bsdbng-studies-${GITHUB_REF_NAME}.tar.gz -C data/studies .
          cp data/derived/ingest_log.json bsdbng-ingest-log-${GITHUB_REF_NAME}.json
          cp logs/pipeline.log bsdbng-pipeline-log-${GITHUB_REF_NAME}.log

      - name: Create release with data assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            bsdbng-raw-data-*.tar.gz
            bsdbng-studies-*.tar.gz
            bsdbng-ingest-log-*.json
            bsdbng-pipeline-log-*.log
